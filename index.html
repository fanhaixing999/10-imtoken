<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安心宝 - 新手离线轻钱包</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .page { display: none; }
    .page.active { display: block; }
    .card { transition: all 0.3s; }
    .card:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">

  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">

    <!-- 欢迎页 -->
    <div id="welcome" class="page active p-8 flex flex-col h-screen">
      <div class="flex-1 flex flex-col justify-center items-center text-center">
        <div class="w-20 h-20 bg-blue-100 rounded-3xl flex items-center justify-center mb-6 text-5xl">🛡️</div>
        <h1 class="text-5xl font-bold text-blue-600 mb-2">安心宝</h1>
        <p class="text-xl text-gray-600 mb-12">第一次接触加密货币，<br>也能安心掌控自己的 ETH</p>
      </div>
      
      <div class="space-y-4">
        <button onclick="showPage('create')" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-6 rounded-3xl text-xl font-semibold shadow-lg">
          创建我的安心钱包<br>
          <span class="text-sm opacity-90">(本地离线生成 · 最高安全)</span>
        </button>
        <button onclick="showPage('home')" class="w-full border-2 border-gray-300 py-6 rounded-3xl text-lg font-medium">我已有账户，直接进入</button>
      </div>
    </div>

    <!-- 创建页 -->
    <div id="create" class="page p-8">
      <div class="text-center py-16">
        <div class="text-7xl mb-8 animate-pulse">🔐</div>
        <h2 class="text-3xl font-bold mb-3">正在本地创建钱包</h2>
        <p class="text-blue-600 mb-8">请保持网络关闭以获得最高安全</p>
        <button onclick="createSuccess()" class="w-full bg-green-600 text-white py-5 rounded-3xl text-lg font-semibold">生成完成 → 备份短语</button>
      </div>
    </div>

    <!-- 备份页 -->
    <div id="backup" class="page p-8">
      <h2 class="text-2xl font-bold mb-4">安全备份短语</h2>
      <p class="text-red-600 mb-6 text-sm leading-relaxed">请用纸笔手抄下面 12 个词，永远不要拍照或保存在网络</p>
      
      <div class="grid grid-cols-3 gap-3 bg-gray-50 p-6 rounded-3xl mb-8">
        <div class="bg-white p-3 rounded-2xl text-center text-sm">ocean</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">mountain</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">river</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">forest</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">valley</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">cloud</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">breeze</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">sunset</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">meadow</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">rainbow</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">thunder</div>
        <div class="bg-white p-3 rounded-2xl text-center text-sm">harmony</div>
      </div>
      <button onclick="showPage('home')" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-semibold">我已手抄完成，进入钱包</button>
    </div>

    <!-- 主页 -->
    <div id="home" class="page p-6">
      <div class="flex justify-between mb-6">
        <div>
          <p class="text-gray-500">我的账户</p>
          <p class="font-mono text-lg cursor-pointer" onclick="copyAddress()">0x71C7...9fA3</p>
        </div>
        <span class="text-green-600">● 已连接</span>
      </div>

      <div class="bg-gradient-to-br from-blue-600 to-indigo-600 text-white rounded-3xl p-8 mb-8 card">
        <p class="opacity-75">总资产</p>
        <p class="text-5xl font-bold mt-1">$2,847.65</p>
        <p class="text-3xl mt-2">0.8521 ETH</p>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <button onclick="showPage('receive')" class="bg-white p-8 rounded-3xl card border">收款</button>
        <button onclick="showPage('transfer')" class="bg-white p-8 rounded-3xl card border">转账</button>
      </div>
    </div>

    <script>
      function showPage(id) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(id).classList.add('active');
      }

      function createSuccess() {
        alert("✅ 钱包已在浏览器本地生成成功！");
        showPage('backup');
      }

      function copyAddress() {
        alert("✅ 地址已复制");
      }

      // 默认显示欢迎页
      showPage('welcome');
    </script>
  </div>
</body>
</html>
