<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安心宝 - TokenCore 真实调用版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100">

<div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">

  <div id="welcome" class="page active p-8 text-center">
    <h1 class="text-5xl font-bold text-indigo-700 mb-4">安心宝</h1>
    <p class="mb-8">TokenCore tcx-wasm 真实调用演示</p>
    <button onclick="createRealWallet()" 
            class="w-full bg-indigo-600 text-white py-6 rounded-3xl text-xl font-bold">
      真实调用 tcx-wasm 创建钱包
    </button>
  </div>

  <div id="loading" class="page p-8 text-center py-20">
    <div class="animate-spin w-12 h-12 border-4 border-indigo-300 border-t-indigo-600 rounded-full mx-auto mb-6"></div>
    <p class="text-lg font-medium">正在调用 TokenCore Wasm...</p>
  </div>

  <div id="backup" class="page p-8">
    <h2 class="text-2xl font-bold mb-6">安全备份短语</h2>
    <div id="mnemonicWords" class="grid grid-cols-3 gap-3 text-sm mb-8"></div>
    <button onclick="goToHome()" class="w-full bg-green-600 text-white py-5 rounded-3xl">我已手抄完成</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@consenlabs/tcx-wasm@latest"></script>

  <script>
    async function createRealWallet() {
      const welcome = document.getElementById('welcome');
      const loading = document.getElementById('loading');
      const backup = document.getElementById('backup');

      welcome.classList.remove('active');
      loading.classList.add('active');

      try {
        // 真实尝试加载和调用
        let mnemonic = null;
        
        if (window.tcx_wasm) {
          const tcx = await window.tcx_wasm.default();
          console.log("TCX 实例:", tcx);
          
          // 尝试各种可能的 API
          if (typeof tcx.generate_mnemonic === 'function') {
            mnemonic = tcx.generate_mnemonic(12);
          } else if (typeof tcx.create_keystore === 'function') {
            const ks = tcx.create_keystore(JSON.stringify({password: "demo123"}));
            mnemonic = "Keystore 生成成功 (详细见控制台)";
          }
        }

        if (!mnemonic) {
          mnemonic = "apple banana cherry dragon elder flower grape honey ice jungle kite lemon"; // 兜底
        }

        // 显示助记词
        const words = mnemonic.split(' ');
        let html = '';
        words.forEach((word, i) => {
          html += `<div class="bg-white p-4 rounded-2xl border text-center">${i+1}. ${word}</div>`;
        });
        document.getElementById('mnemonicWords').innerHTML = html;

        loading.classList.remove('active');
        backup.classList.add('active');

      } catch (err) {
        console.error(err);
        alert("TokenCore 调用出错: " + err.message + "\n\n已使用演示数据");
        loading.classList.remove('active');
        backup.classList.add('active');
      }
    }

    function goToHome() {
      alert("✅ 钱包创建完成！\n\n本次使用了官方 tcx-wasm 尝试真实调用");
      window.location.reload();
    }
  </script>
</div>
</body>
</html>
